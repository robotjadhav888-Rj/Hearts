        body {

            width: 100%;
            pointer-events: none;

        .hanging-heart {

            transform-origin: top center;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

            stroke: var(--string-color);
            stroke-width: 1.5;

            fill: var(--heart-pink);

        .heart-shape.pink-light { fill: #ffb3c1; }
        .heart-shape.pink-mid { fill: #ff758f; }

        /* Animation class */
        .swinging {
            animation: swing-animation 3s ease-in-out forwards;
        }

        @keyframes swing-animation {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(20deg); }
            30% { transform: rotate(-15deg); }
            50% { transform: rotate(10deg); }
            70% { transform: rotate(-5deg); }
            90% { transform: rotate(2deg); }

                        <line x1="50" y1="0" x2="50" y2="250" class="string"></line>
                        <path d="M50 260 
                                 C50 250 20 250 20 270 
                                 C20 285 50 300 50 305 
                                 C50 300 80 285 80 270 
                                 C80 250 50 250 50 260 Z" class="heart-shape pink-mid"></path>
                    </svg>
                </div></div>

    <script>
        const container = document.getElementById('mainContainer');
        
        const heartsData = [
            { x: 15, h: 220, s: 0.8, c: 'pink-light' },
            { x: 35, h: 150, s: 0.6, c: 'pink-mid' },
            { x: 55, h: 300, s: 1.0, c: '' },
            { x: 75, h: 180, s: 0.7, c: 'pink-light' },
            { x: 88, h: 250, s: 0.9, c: 'pink-mid' }
        ];

        function createHearts() {
            heartsData.forEach((data) => {
                const heartGroup = document.createElement('div');
                heartGroup.className = 'hanging-heart';
                heartGroup.style.left = `${data.x}%`;
                heartGroup.style.top = '0px';
                
                heartGroup.innerHTML = `
                    <svg width="100" height="${data.h + 80}" viewBox="0 0 100 ${data.h + 80}" style="transform: scale(${data.s})">
                        <line x1="50" y1="0" x2="50" y2="${data.h}" class="string" />
                        <path d="M50 ${data.h + 10} 
                                 C50 ${data.h} 20 ${data.h} 20 ${data.h + 20} 
                                 C20 ${data.h + 35} 50 ${data.h + 50} 50 ${data.h + 55} 
                                 C50 ${data.h + 50} 80 ${data.h + 35} 80 ${data.h + 20} 
                                 C80 ${data.h} 50 ${data.h} 50 ${data.h + 10} Z" 
                              class="heart-shape ${data.c}" />
                    </svg>
                `;

                const triggerSwing = () => {
                    heartGroup.classList.remove('swinging');
                    void heartGroup.offsetWidth; 
                    heartGroup.classList.add('swinging');
                };

                heartGroup.addEventListener('mousedown', triggerSwing);
                heartGroup.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    triggerSwing();
                });

                container.appendChild(heartGroup);
            });
        }

        function createDots() {
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                const size = Math.random() * 8 + 4;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.top = `${Math.random() * 60}%`;
                dot.style.backgroundColor = Math.random() > 0.5 ? '#ffffff' : '#ff85a1';
                dot.style.opacity = Math.random() * 0.5 + 0.3;
                container.appendChild(dot);
            }
        }

        // Function to download the current file
        function downloadThisFile() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_hearts_animation.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.onload = () => {
            createDots();
            createHearts();
        };
    </script>

</body></html>
